<!DOCTYPE html>
<html>

<body>
    <h2>JavaScript const</h2>
    <p>You can NOT reassign a constant array:</p>

    <p id="demo"></p>

    <script>
        try {
            const cars = ["Saab", "Volvo", "BMW"];
            // cars = ["Toyota", "Volvo", "Audi"];

            let added_cars = ["Toyota", "Volvo", "Audi"];
            let new_cars = cars.concat(added_cars);
            console.log(new_cars);
            document.getElementById("demo").innerHTML = new_cars;
        }
        catch (err) {
            document.getElementById("demo").innerHTML = err;
        }
    </script>

</body>

</html>
